<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GamePlus+ — Tienda digital de videojuegos para PC. Comprá, descargá y jugá.">
  <meta name="theme-color" content="#0a0c14">
  <title>GamePlus+ | Tienda de Videojuegos PC</title>

  <link rel="icon" href="img/logos/logo.jpg" type="image/jpeg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/hero.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/paneles.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

  <!-- Inicio de overlays y componentes globales -->

  <!-- Mensajes emergentes de confirmación -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- Fondo oscuro compartido por paneles y búsqueda -->
  <div id="overlay" class="overlay"></div>

  <!-- Modal de detalle de juego -->
  <div id="modal-juego"
       class="modal"
       role="dialog"
       aria-modal="true"
       aria-labelledby="modal-titulo"
       hidden>

    <div class="modal-contenido">

      <button id="modal-cerrar"
              class="modal-cerrar"
              aria-label="Cerrar detalle">
        &#10005;
      </button>

      <div class="modal-imagen-wrap">
        <img id="modal-img"
             src=""
             alt=""
             class="modal-img">
      </div>

      <div class="modal-info">

        <span id="modal-genero"
              class="tarjeta-genero">
        </span>

        <h2 id="modal-titulo"
            class="modal-titulo">
        </h2>

        <p id="modal-dev"
           class="tarjeta-dev">
        </p>

        <div id="modal-estrellas"
             class="estrellas modal-estrellas">
        </div>

        <p id="modal-descripcion"
           class="modal-descripcion">
        </p>

        <div class="modal-footer">

          <div id="modal-precio-bloque"></div>

          <div class="modal-acciones">

            <button id="modal-btn-agregar"
                    class="btn-agregar">
              + Agregar al carrito
            </button>

            <button id="modal-btn-favorito"
                    class="btn-favorito modal-btn-fav">
              &#9825;
            </button>

          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Panel de búsqueda estilo PlayStation Store -->
  <div id="panel-busqueda"
       class="panel-busqueda"
       role="search"
       aria-label="Buscar juegos">

    <div class="panel-busqueda-barra">

      <svg class="panel-busqueda-icono"
           xmlns="http://www.w3.org/2000/svg"
           width="22"
           height="22"
           viewBox="0 0 24 24"
           fill="none"
           stroke="currentColor"
           stroke-width="2"
           stroke-linecap="round"
           stroke-linejoin="round">

        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>

      </svg>

      <input type="text"
             id="input-busqueda"
             placeholder="Buscar juegos, géneros o estudios..."
             autocomplete="off"
             spellcheck="false">

      <button id="btn-cerrar-busqueda"
              class="btn-cerrar-busqueda"
              aria-label="Cerrar búsqueda">
        &#10005;
      </button>

    </div>

    <div id="resultados-busqueda"
         class="resultados-busqueda">
    </div>
  </div>

  <!-- Inicio de paneles laterales -->

  <!-- Carrito de compras: panel lateral derecho -->
  <aside id="carrito-sidebar"
         class="panel-lateral"
         aria-label="Carrito de compras">

    <div class="panel-lateral-header">

      <h2>Tu Carrito</h2>

      <button id="cerrar-carrito"
              class="btn-cerrar-panel"
              aria-label="Cerrar carrito">
        &#10005;
      </button>

    </div>

    <div id="carrito-items"
         class="panel-lateral-items">
    </div>

    <div class="panel-lateral-footer">

      <div id="carrito-bundle-info"
           class="carrito-bundle"
           hidden>
      </div>

      <div class="carrito-total">
        <span>Total</span>
        <span id="carrito-total-precio">$0.00</span>
      </div>

      <button class="btn-comprar"
              id="btn-comprar">
        Finalizar compra
      </button>

    </div>
  </aside>

  <!-- Historial de compras: panel lateral derecho -->
  <aside id="historial-sidebar"
         class="panel-lateral"
         aria-label="Mis juegos">

    <div class="panel-lateral-header">

      <h2>Mis Juegos</h2>

      <button id="cerrar-historial"
              class="btn-cerrar-panel"
              aria-label="Cerrar historial">
        &#10005;
      </button>

    </div>

    <div id="historial-items"
         class="panel-lateral-items">
    </div>
  </aside>

  <!-- Favoritos: panel lateral izquierdo -->
  <aside id="favoritos-sidebar"
         class="panel-lateral panel-lateral--izq"
         aria-label="Mis favoritos">

    <div class="panel-lateral-header">

      <h2>Mis Favoritos</h2>

      <button id="cerrar-favoritos"
              class="btn-cerrar-panel"
              aria-label="Cerrar favoritos">
        &#10005;
      </button>

    </div>

    <div id="favoritos-items"
         class="panel-lateral-items">
    </div>

    <div id="favoritos-footer"
         class="panel-lateral-footer"
         hidden>

      <button id="btn-agregar-todos"
              class="btn-agregar-todos">
        Agregar todo al carrito
      </button>

    </div>
  </aside>

  <!-- Inicio del header principal -->

  <!-- Header con logo, nav y menú -->
  <header>

    <!-- Barra principal -->
    <div class="barra-principal">

      <!-- Logo -->
      <a href="/"
         class="header-logo-wrap"
         aria-label="GamePlus+ — Inicio">

        <img src="img/logos/logo.jpg"
             alt="GamePlus+"
             class="header-logo">

      </a>

      <!-- Acciones del header -->
      <div class="header-acciones">

        <button class="btn-icono"
                id="btn-buscar"
                aria-label="Buscar"
                aria-expanded="false">

          <svg xmlns="http://www.w3.org/2000/svg"
               width="18"
               height="18"
               viewBox="0 0 24 24"
               fill="none"
               stroke="currentColor"
               stroke-width="2"
               stroke-linecap="round"
               stroke-linejoin="round">

            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>

          </svg>
        </button>

      </div>

      <!-- Navegación por géneros -->
      <nav class="nav-inferior"
           aria-label="Filtrar por género">

        <ul>
          <li class="filtro-activo" data-filtro="todos">Explorar</li>
          <li data-filtro="shooter">Shooter</li>
          <li data-filtro="rpg">RPG</li>
          <li data-filtro="accion">Acción</li>
          <li data-filtro="horror">Horror</li>
          <li data-filtro="supervivencia">Supervivencia</li>
        </ul>

      </nav>
    </div>
  </header>

  <!-- Inicio del contenido principal -->
  <main>

    <!-- Inicio sección hero carousel -->

    <!-- Hero carousel responsive -->
    <section id="hero-carousel"
             aria-label="Destacados">

      <div class="carousel-track"
           id="carousel-track">

        <!-- Slide 1 -->
        <div class="carousel-slide"
             style="background-image: url('img/heroes/portada.jpg')">

          <div class="slide-overlay">

            <div class="slide-contenido">

              <p class="slide-eyebrow">
                Tienda digital para PC
              </p>

              <h1>
                Bienvenidos a<br>
                <span class="slide-marca">GamePlus+</span>
              </h1>

            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Sección Quiénes Somos -->
    <section id="quienes-somos">
      <div class="qs-contenido">

        <h2 class="qs-titulo">
          Sobre <span>GamePlus+</span>
        </h2>

      </div>
    </section>

    <!-- Inicio sección catálogo -->

    <!-- Catálogo de juegos -->
    <section id="tienda">

      <div class="tienda-header">

        <h2>TIENDA</h2>

        <p id="conteo-juegos"
           class="conteo-juegos">
        </p>

      </div>

      <div class="grilla-juegos"
           id="grilla-juegos"
           role="list"
           aria-label="Catálogo de juegos">
      </div>

    </section>

  </main>

  <!-- Footer principal del sitio -->
  <footer id="footer">

    <div class="footer-contenido">

      <div class="footer-marca">

        <img src="img/logos/logo.jpg"
             alt="GamePlus+"
             class="footer-logo-img">

        <p>
          La tienda digital de videojuegos para PC más completa de la región.
        </p>

      </div>
    </div>

    <div class="footer-bottom">
      <p>Juan Perinot &copy; 2026 &mdash; ISTEA</p>
    </div>

  </footer>

  <script type="module" src="js/main.js"></script>

</body>
</html>
